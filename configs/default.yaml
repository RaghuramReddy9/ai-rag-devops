paths:
  raw_data_dir: data/raw
  persist_dir: chroma_db_minilm
  chunks_output: data/processed/chunks.jsonl
  prompt_config: configs/prompts.yaml
  gold_dataset_path: data/eval/gold_qa.jsonl

chunking:
  chunk_size: 600
  chunk_overlap: 100

retrieval:
  top_k: 3

models:
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  llm_model: llama-3.3-70b-versatile

evaluation:
  retrieval_k_values: [1, 3, 5]
